name: AWS API Deploy Pipeline

on:
  push:
    branches: [main, develop, test]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.10"

jobs:
  # ── Job 1 : Lint & validation ──────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install flake8
      - name: Lint Lambda functions
        run: flake8 lambdas/ --max-line-length=120 --ignore=E501

  # ── Job 2 : Deploy selon la branche ───────────────────────────────────────
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: lint
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'test' && 'test' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install boto3 requests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy infrastructure
        run: python scripts/deploy.py

      - name: Run API tests
        run: |
          STAGE=${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'test' && 'test' || 'dev' }}
          python scripts/test_api.py $STAGE

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ github.ref_name }}
          path: config.json
