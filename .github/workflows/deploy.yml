name: CI/CD Direct Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy GetProducts
        run: |
          # 1. On crée le pack de la fonction
          zip -j get_products.zip get_products.py
          
          # 2. Mise à jour directe du code
          aws lambda update-function-code \
            --function-name get_products_direct \
            --zip-file fileb://get_products.zip

      - name: Deploy API Stage
        run: |
          # 3. On force le déploiement de l'API Gateway sur le stage prod
          aws apigateway create-deployment \
            --rest-api-id ei826hfozk \
            --stage-name prod \
            --description "Deploy direct depuis GitHub"